<!DOCTYPE html>
<html>
<head>
    <title>Truth Table Generator</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f4f6f8;
            padding-top: 50px;
        }

        .box {
            background: white;
            width: 500px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #333;
            padding: 10px;
        }

        th {
            background: #ddd;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Truth Table Generator</h1>

        <table>
            <tr>
                <th>A</th>
                <th>B</th>
                <th>AND</th>
                <th>OR</th>
            </tr>
            <tr>
                <td>0</td>
                <td>0</td>
                <td>0</td>
                <td>0</td>
            </tr>
            <tr>
                <td>0</td>
                <td>1</td>
                <td>0</td>
                <td>1</td>
            </tr>
            <tr>
                <td>1</td>
                <td>0</td>
                <td>0</td>
                <td>1</td>
            </tr>
            <tr>
                <td>1</td>
                <td>1</td>
                <td>1</td>
                <td>1</td>
            </tr>
        </table>

        <h2>NOT Gate</h2>

        <table>
            <tr>
                <th>A</th>
                <th>NOT A</th>
            </tr>
            <tr>
                <td>0</td>
                <td>1</td>
            </tr>
            <tr>
                <td>1</td>
                <td>0</td>
            </tr>
        </table>
    </div>

</body>
</html>
